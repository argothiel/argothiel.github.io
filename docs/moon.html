<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunar Phase Visualizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne+Mono&family=Syne:wght@400;700;800&display=swap">
<link rel="stylesheet" href="moon/styles.css">
</head>
<body>

<header>
  <h1>Lunar Phase Visualizer</h1>
  <p>Sun · Earth · Moon — positional geometry</p>
</header>

<div class="main-grid">

  <!-- Top-down orbital view, with a thin observer's-horizon strip on the right -->
  <div class="panel orbital-panel">
    <div class="orbital-row">
      <canvas id="orbitalCanvas"
              aria-label="Top-down diagram of the Sun, Earth, and Moon, showing the Moon's current orbital position and the observer on Earth's surface."></canvas>
      <canvas id="horizonCanvas"
              aria-label="Observer's horizon strip showing the Moon at its current altitude with the corresponding lunar phase."></canvas>
    </div>
  </div>

  <!-- Info bar -->
  <div class="info-panel" aria-live="polite">
    <div class="info-cell">
      <div class="info-cell-label">Lunar Day</div>
      <div class="info-cell-value" id="lunarDayVal">0.0</div>
    </div>
    <div class="info-cell">
      <div class="info-cell-label">Time (UTC)</div>
      <div class="info-cell-value" id="timeOfDayVal">12:00</div>
    </div>
    <div class="info-cell">
      <div class="info-cell-label">Phase Name</div>
      <div class="info-cell-value highlight" id="phaseName">New Moon</div>
    </div>
    <button id="resetButton" class="info-cell info-action" type="button" aria-label="Reset to default lunar day and time">Reset</button>
  </div>

</div>

<script type="module" src="moon/main.js"></script>
</body>
</html>
