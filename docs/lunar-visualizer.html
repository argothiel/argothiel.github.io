<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunar Phase Visualizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne+Mono&family=Syne:wght@400;700;800&display=swap">
<link rel="stylesheet" href="lunar-visualizer/styles.css">
</head>
<body>

<header>
  <h1>Lunar Phase Visualizer</h1>
  <p>Sun · Earth · Moon — positional geometry</p>
</header>

<div class="main-grid">

  <!-- Top-down orbital view -->
  <div class="panel">
    <div class="panel-title">// Orbital View — top down</div>
    <canvas id="orbitalCanvas"
            aria-label="Top-down diagram of the Sun, Earth, and Moon, showing the Moon's current orbital position and the observer on Earth's surface."></canvas>
  </div>

  <!-- Horizon view (with Moon phase) -->
  <div class="panel horizon-panel">
    <div class="panel-title">// Observer's Horizon</div>
    <canvas id="horizonCanvas"
            aria-label="Observer's horizon at the chosen time of day, showing the Moon at its current altitude with the corresponding lunar phase."></canvas>
  </div>

  <!-- Controls -->
  <div class="panel controls-panel">
    <div class="control-group">
      <div class="control-label">
        <label for="lunarDay">Lunar Day</label>
        <span class="control-value" id="lunarDayVal">0.0</span>
      </div>
      <input type="range" id="lunarDay" min="0" max="29.5" step="0.1" value="0">
    </div>
    <div class="control-group">
      <div class="control-label">
        <label for="timeOfDay">Time of Day (UTC)</label>
        <span class="control-value" id="timeOfDayVal">12:00</span>
      </div>
      <input type="range" id="timeOfDay" min="0" max="23.95" step="0.05" value="12">
    </div>
  </div>

  <!-- Info bar -->
  <div class="info-panel" aria-live="polite">
    <div class="info-cell">
      <div class="info-cell-label">Phase Name</div>
      <div class="info-cell-value highlight" id="phaseName">New Moon</div>
    </div>
    <div class="info-cell">
      <div class="info-cell-label">Illumination</div>
      <div class="info-cell-value" id="illumination">0%</div>
    </div>
    <div class="info-cell">
      <div class="info-cell-label">Moon Angle</div>
      <div class="info-cell-value" id="moonAngle">0°</div>
    </div>
  </div>

</div>

<script type="module" src="lunar-visualizer/main.js"></script>
</body>
</html>
